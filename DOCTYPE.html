<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rising Ritual">
<title>THE RISING RITUAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent1: #e8a838;
    --accent2: #c4583a;
    --accent3: #4a9eca;
    --text: #e8e0d0;
    --muted: #7a7468;
    --phase-warm: #e8a838;
    --phase-mob: #9b7fd4;
    --phase-hypo: #4a9eca;
    --phase-fire: #e85428;
    --phase-qi: #48c47a;
    --phase-yoga: #7bb8e8;
    --phase-cool: #b088d8;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bot: env(safe-area-inset-bottom, 34px);
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Noto Serif’, Georgia, serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
min-height: -webkit-fill-available;
overflow: hidden;
position: fixed;
width: 100%;
height: 100%;
}

/* Grain texture overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 1000;
opacity: 0.6;
}

#app {
display: flex;
flex-direction: column;
height: 100%;
height: -webkit-fill-available;
padding-top: var(–safe-top);
padding-bottom: var(–safe-bot);
overflow: hidden;
}

/* ── HEADER ── */
#header {
padding: 10px 18px 8px;
background: linear-gradient(180deg, #0a0a0f 0%, transparent 100%);
flex-shrink: 0;
position: relative;
z-index: 10;
}

#title-bar {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 6px;
}

#main-title {
font-family: ‘Cinzel’, serif;
font-size: 11px;
letter-spacing: 3px;
color: var(–accent1);
text-transform: uppercase;
opacity: 0.8;
}

#total-timer {
font-family: ‘Cinzel’, serif;
font-size: 13px;
color: var(–muted);
letter-spacing: 1px;
}

#total-timer span {
color: var(–text);
}

/* progress bar */
#progress-track {
height: 2px;
background: var(–border);
border-radius: 1px;
overflow: hidden;
}

#progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–accent2), var(–accent1));
border-radius: 1px;
transition: width 0.5s ease;
width: 0%;
}

/* next movement info */
#next-info {
display: flex;
align-items: center;
gap: 6px;
margin-top: 6px;
opacity: 0.65;
}

#next-label {
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
}

#next-name {
font-size: 11px;
color: var(–text);
font-style: italic;
}

/* ── CURRENT MOVEMENT TIMER ── */
#timer-section {
padding: 6px 18px;
display: flex;
align-items: center;
gap: 12px;
flex-shrink: 0;
position: relative;
z-index: 10;
}

#move-timer-ring {
position: relative;
width: 64px;
height: 64px;
flex-shrink: 0;
}

#move-timer-ring svg {
transform: rotate(-90deg);
}

#move-timer-ring .ring-bg {
fill: none;
stroke: var(–border);
stroke-width: 3;
}

#move-timer-ring .ring-fill {
fill: none;
stroke: var(–accent1);
stroke-width: 3;
stroke-linecap: round;
stroke-dasharray: 175.9;
stroke-dashoffset: 0;
transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
}

#move-time-text {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Cinzel’, serif;
font-size: 16px;
font-weight: 700;
color: var(–text);
}

#move-info-right {
flex: 1;
min-width: 0;
}

#phase-badge {
display: inline-flex;
align-items: center;
gap: 5px;
padding: 3px 8px;
border-radius: 20px;
background: rgba(255,255,255,0.06);
border: 1px solid var(–border);
margin-bottom: 4px;
}

#phase-dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: var(–accent1);
flex-shrink: 0;
}

#phase-name {
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–muted);
}

#move-name {
font-family: ‘Cinzel’, serif;
font-size: 16px;
font-weight: 700;
color: var(–text);
line-height: 1.2;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

#move-duration-hint {
font-size: 10px;
color: var(–muted);
margin-top: 2px;
}

/* ── CONTENT SCROLL AREA ── */
#content-area {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
padding: 0 18px 16px;
position: relative;
}

#content-area::-webkit-scrollbar { display: none; }

/* ── MOVEMENT CARD ── */
.move-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
overflow: hidden;
margin-bottom: 12px;
}

.card-section {
padding: 14px 16px;
border-bottom: 1px solid var(–border);
}

.card-section:last-child {
border-bottom: none;
}

.section-label {
font-size: 8px;
letter-spacing: 2.5px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 6px;
}

.section-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

.section-body {
font-size: 13px;
line-height: 1.75;
color: #c8c0b0;
}

.section-body p + p {
margin-top: 8px;
}

/* Bandha tags */
.bandha-grid {
display: flex;
flex-wrap: wrap;
gap: 6px;
margin-top: 4px;
}

.bandha-tag {
padding: 5px 10px;
border-radius: 6px;
font-size: 11px;
letter-spacing: 0.5px;
font-family: ‘Cinzel’, serif;
font-weight: 700;
border: 1px solid;
}

.bandha-mula { color: #e85428; border-color: rgba(232,84,40,0.4); background: rgba(232,84,40,0.1); }
.bandha-uddiyana { color: #e8a838; border-color: rgba(232,168,56,0.4); background: rgba(232,168,56,0.1); }
.bandha-jalandhara { color: #4a9eca; border-color: rgba(74,158,202,0.4); background: rgba(74,158,202,0.1); }
.bandha-maha { color: #b088d8; border-color: rgba(176,136,216,0.4); background: rgba(176,136,216,0.1); }
.bandha-none { color: var(–muted); border-color: var(–border); background: transparent; font-size: 10px; font-family: ‘Noto Serif’, serif; font-weight: 400; font-style: italic; }

/* Breath pattern visual */
.breath-pattern {
display: flex;
align-items: center;
gap: 4px;
margin-top: 6px;
font-size: 11px;
}

.breath-in { color: #4a9eca; }
.breath-hold { color: #e8a838; }
.breath-out { color: #48c47a; }
.breath-sep { color: var(–muted); font-size: 9px; }

/* Chakra */
.chakra-row {
display: flex;
align-items: center;
gap: 8px;
margin-top: 6px;
}

.chakra-dot {
width: 10px;
height: 10px;
border-radius: 50%;
flex-shrink: 0;
}

.chakra-text {
font-size: 12px;
color: #c8c0b0;
}

/* How-to steps */
.steps-list {
counter-reset: step;
list-style: none;
}

.steps-list li {
counter-increment: step;
display: flex;
gap: 10px;
margin-bottom: 8px;
font-size: 12.5px;
line-height: 1.6;
color: #c8c0b0;
}

.steps-list li::before {
content: counter(step);
width: 20px;
height: 20px;
min-width: 20px;
border-radius: 50%;
background: var(–border);
color: var(–muted);
display: flex;
align-items: center;
justify-content: center;
font-size: 10px;
font-family: ‘Cinzel’, serif;
margin-top: 2px;
}

/* Phase divider */
.phase-header {
display: flex;
align-items: center;
gap: 10px;
padding: 14px 0 8px;
}

.phase-icon {
width: 28px;
height: 28px;
border-radius: 8px;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
flex-shrink: 0;
}

.phase-title-text {
font-family: ‘Cinzel’, serif;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
}

/* ── CONTROLS ── */
#controls {
padding: 12px 18px;
flex-shrink: 0;
background: linear-gradient(0deg, #0a0a0f 0%, transparent 100%);
position: relative;
z-index: 10;
}

#controls-row {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}

.ctrl-btn {
display: flex;
align-items: center;
justify-content: center;
border: none;
cursor: pointer;
border-radius: 50%;
background: var(–card);
border: 1px solid var(–border);
color: var(–text);
transition: all 0.15s ease;
-webkit-tap-highlight-color: transparent;
user-select: none;
}

.ctrl-btn:active {
transform: scale(0.92);
background: var(–border);
}

.ctrl-btn.sm { width: 44px; height: 44px; font-size: 16px; }
.ctrl-btn.lg { width: 60px; height: 60px; font-size: 22px; background: var(–accent1); border-color: transparent; color: var(–bg); }
.ctrl-btn.lg:active { background: #c88020; }

.ctrl-btn.danger {
background: rgba(200,50,30,0.15);
border-color: rgba(200,50,30,0.3);
color: #e87050;
}

/* ── IDLE SCREEN ── */
#idle-screen {
position: absolute;
inset: 0;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 200;
padding: 40px 24px;
text-align: center;
}

#idle-screen.hidden { display: none; }

.ritual-symbol {
font-size: 48px;
margin-bottom: 20px;
animation: breathe 4s ease-in-out infinite;
}

@keyframes breathe {
0%, 100% { transform: scale(1); opacity: 0.8; }
50% { transform: scale(1.08); opacity: 1; }
}

#idle-title {
font-family: ‘Cinzel’, serif;
font-size: 22px;
font-weight: 900;
letter-spacing: 4px;
color: var(–accent1);
margin-bottom: 6px;
}

#idle-subtitle {
font-size: 12px;
letter-spacing: 2px;
color: var(–muted);
margin-bottom: 30px;
}

#idle-stats {
display: flex;
gap: 24px;
margin-bottom: 36px;
}

.idle-stat {
text-align: center;
}

.idle-stat-val {
font-family: ‘Cinzel’, serif;
font-size: 24px;
font-weight: 700;
color: var(–text);
display: block;
}

.idle-stat-lbl {
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
}

#start-btn {
padding: 16px 40px;
background: linear-gradient(135deg, var(–accent2), var(–accent1));
border: none;
border-radius: 12px;
font-family: ‘Cinzel’, serif;
font-size: 13px;
letter-spacing: 3px;
color: var(–bg);
font-weight: 700;
cursor: pointer;
text-transform: uppercase;
transition: all 0.2s;
-webkit-tap-highlight-color: transparent;
}

#start-btn:active { transform: scale(0.96); opacity: 0.9; }

/* ── COMPLETE SCREEN ── */
#complete-screen {
position: absolute;
inset: 0;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 200;
padding: 40px 24px;
text-align: center;
}

#complete-screen.hidden { display: none; }

#complete-symbol {
font-size: 56px;
margin-bottom: 20px;
animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
0%, 100% { filter: drop-shadow(0 0 8px rgba(232,168,56,0.3)); }
50% { filter: drop-shadow(0 0 24px rgba(232,168,56,0.8)); }
}

#complete-title {
font-family: ‘Cinzel’, serif;
font-size: 18px;
letter-spacing: 4px;
color: var(–accent1);
margin-bottom: 8px;
}

#complete-msg {
font-size: 13px;
color: var(–muted);
line-height: 1.7;
margin-bottom: 30px;
font-style: italic;
}

#restart-btn {
padding: 14px 32px;
background: var(–card);
border: 1px solid var(–border);
border-radius: 10px;
font-family: ‘Cinzel’, serif;
font-size: 12px;
letter-spacing: 2px;
color: var(–text);
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}

/* ── TRANSITION FLASH ── */
#transition-flash {
position: fixed;
inset: 0;
background: rgba(232,168,56,0.12);
pointer-events: none;
opacity: 0;
z-index: 500;
transition: opacity 0.3s;
}

#transition-flash.flash {
opacity: 1;
transition: opacity 0s;
}

/* Hidden video for wake lock fallback */
#wakelock-video {
position: fixed;
top: -9999px;
left: -9999px;
width: 1px;
height: 1px;
opacity: 0.01;
}
</style>

</head>

<script>
// ══════════════════════════════════════════════
// SEQUENCE DATA
// ══════════════════════════════════════════════
const PHASES = {
  warmup: { name: 'WARM-UP', color: '#e8a838', emoji: '🟠' },
  mob:    { name: 'MOBILITY BRIDGE', color: '#9b7fd4', emoji: '🟡' },
  hypo:   { name: 'HYPOPRESSIVE', color: '#4a9eca', emoji: '🔵' },
  fire:   { name: 'KUNDALINI FIRE', color: '#e85428', emoji: '🔴' },
  qi:     { name: 'QIGONG FLOW', color: '#48c47a', emoji: '🟢' },
  yoga:   { name: 'YOGA FLOW', color: '#7bb8e8', emoji: '🌿' },
  cool:   { name: 'COOL-DOWN', color: '#b088d8', emoji: '🌙' },
};

const SEQUENCE = [
  // ── PHASE 1 WARM-UP ──
  {
    id: 0, phase: 'warmup', duration: 60,
    name: 'Root Stomp & Bounce',
    nameFA: 'استومپ و پرش پا',
    how: [
      'روی زمین بدون کفش بایست.',
      'با زانوهای نرم شروع به پرش ملایم کن — پاشنه‌ها کمی از زمین فاصله می‌گیرند.',
      'بازوها کاملاً شل و آویزان، طبیعی تکان می‌خورند.',
      'بعد از ۲۰ ثانیه، یه ضربه نرم پاشنه‌ای به هر پرش اضافه کن.',
      'تمام بدن شل باشه — فک، شانه‌ها، همه چیز.',
    ],
    breath: { text: 'دم: ۲ شمارش از بینی · بازدم: صدای آرام "هاه" از دهان روی هر ضربه · نگه ندار', in: 2, hold: 0, out: 2 },
    bandhas: [

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let state = {
  running: false,
  paused: false,
  currentIdx: 0,
  timeLeft: 0,
  elapsed: 0,
  intervalId: null,
  totalDuration: SEQUENCE.reduce((s, m) => s + m.duration, 0),
  soundOn: true,
  wakeLockActive: false,
};

// ══════════════════════════════════════════════
// WAKE LOCK
// ══════════════════════════════════════════════
let wakeLockSentinel = null;

async function requestWakeLock() {
  // Try Screen Wake Lock API first
  if ('wakeLock' in navigator) {
    try {
      wakeLockSentinel = await navigator.wakeLock.request('screen');
      state.wakeLockActive = true;
      return;
    } catch (e) {}
  }
  // Fallback: invisible video loop trick for iOS
  try {
    const v = document.getElementById('wakelock-video');
    await v.play();
    state.wakeLockActive = true;
  } catch(e) {}
}

function releaseWakeLock() {
  if (wakeLockSentinel) {
    wakeLockSentinel.release().catch(()=>{});
    wakeLockSentinel = null;
  }
  const v = document.getElementById('wakelock-video');
  v.pause();
  state.wakeLockActive = false;
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && state.running && !state.paused) {
    await requestWakeLock();
  }
});

// ══════════════════════════════════════════════
// AUDIO (simple Web Audio beeps)
// ══════════════════════════════════════════════
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq = 880, dur = 0.12, vol = 0.3) {
  if (!state.soundOn) return;
  try {
    ensureAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function beepStart() { beep(660, 0.1); setTimeout(() => beep(880, 0.15), 120); }
function beepNext()  { beep(770, 0.12); }
function beepEnd()   { beep(440, 0.1); setTimeout(() => beep(550, 0.1), 120); setTimeout(() => beep(660, 0.2), 250); }
function beepTick()  { beep(1100, 0.05, 0.15); }

// ══════════════════════════════════════════════
// RENDERING
// ══════════════════════════════════════════════
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function renderMove(idx) {
  const m = SEQUENCE[idx];
  const ph = PHASES[m.phase];
  const next = idx < SEQUENCE.length - 1 ? SEQUENCE[idx + 1] : null;

  // Phase badge
  document.getElementById('phase-dot').style.background = ph.color;
  document.getElementById('phase-name').textContent = ph.emoji + ' ' + ph.name;

  // Move name
  document.getElementById('move-name').textContent = m.name;
  document.getElementById('move-duration-hint').textContent = m.nameFA + ' · ' + m.duration + 'ث';

  // Next
  document.getElementById('next-name').textContent = next ? (next.name + ' (' + next.duration + 'ث)') : '— پایان ریچوال';

  // Ring arc color
  document.getElementById('ring-arc').style.stroke = ph.color;

  // Timer
  updateTimerDisplay();

  // Content
  renderContent(m);
}

function renderContent(m) {
  const ph = PHASES[m.phase];

  let bandhaHTML = m.bandhas.map(b =>
    `<span class="bandha-tag ${b.cls}">${b.label}${b.note ? ' <small style="opacity:0.7;font-size:9px">— '+b.note+'</small>' : ''}</span>`
  ).join('');

  let stepsHTML = m.how.map(s => `<li>${s}</li>`).join('');

  let tipHTML = m.tip ? `
    <div class="card-section">
      <div class="section-label">💡 نکته</div>
      <div class="section-body">${m.tip}</div>
    </div>` : '';

  document.getElementById('move-content').innerHTML = `
    <div class="move-card">
      <div class="card-section">
        <div class="section-label">بانداهای فعال</div>
        <div class="bandha-grid">${bandhaHTML}</div>
      </div>
      <div class="card-section">
        <div class="section-label">تنفس</div>
        <div class="section-body">${m.breath.text}</div>
      </div>
      <div class="card-section">
        <div class="section-label">نحوه اجرا</div>
        <div class="section-body">
          <ol class="steps-list">${stepsHTML}</ol>
        </div>
      </div>
      <div class="card-section">
        <div class="section-label">چاکرا</div>
        <div class="chakra-row">
          <div class="chakra-dot" style="background:${m.chakra.color}"></div>
          <div class="chakra-text"><strong>${m.chakra.name}</strong> — ${m.chakra.note}</div>
        </div>
      </div>
      ${tipHTML}
    </div>
  `;

  // Scroll to top of content
  document.getElementById('content-area').scrollTop = 0;
}

function updateTimerDisplay() {
  const m = SEQUENCE[state.currentIdx];
  const t = state.timeLeft;

  document.getElementById('move-time-text').textContent = formatTime(t);

  // Ring
  const circumference = 175.9;
  const fraction = t / m.duration;
  const offset = circumference * (1 - fraction);
  document.getElementById('ring-arc').style.strokeDashoffset = offset;

  // Elapsed
  document.getElementById('elapsed-display').textContent = formatTime(state.elapsed);

  // Progress
  const pct = (state.elapsed / state.totalDuration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function flashTransition() {
  const el = document.getElementById('transition-flash');
  el.classList.add('flash');
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('flash')));
}

// ══════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════
function startRitual() {
  ensureAudio();
  state.currentIdx = 0;
  state.timeLeft = SEQUENCE[0].duration;
  state.elapsed = 0;
  state.running = true;
  state.paused = false;

  document.getElementById('idle-screen').classList.add('hidden');
  document.getElementById('complete-screen').classList.add('hidden');

  renderMove(0);
  startInterval();
  requestWakeLock();
  beepStart();
  updatePlayPauseBtn();
}

function startInterval() {
  clearInterval(state.intervalId);
  state.intervalId = setInterval(tick, 1000);
}

function tick() {
  if (state.paused) return;

  state.timeLeft--;
  state.elapsed++;

  if (state.timeLeft <= 3 && state.timeLeft > 0) beepTick();

  updateTimerDisplay();

  if (state.timeLeft <= 0) {
    advanceMove();
  }
}

function advanceMove() {
  if (state.currentIdx >= SEQUENCE.length - 1) {
    finishRitual();
    return;
  }
  flashTransition();
  beepNext();
  state.currentIdx++;
  state.timeLeft = SEQUENCE[state.currentIdx].duration;
  renderMove(state.currentIdx);
}

function finishRitual() {
  clearInterval(state.intervalId);
  state.running = false;
  releaseWakeLock();
  beepEnd();
  document.getElementById('complete-screen').classList.remove('hidden');
}

function togglePlayPause() {
  ensureAudio();
  if (!state.running) return;
  state.paused = !state.paused;
  updatePlayPauseBtn();
  if (!state.paused) {
    requestWakeLock();
    beep(660, 0.08);
  } else {
    releaseWakeLock();
    beep(440, 0.1);
  }
}

function updatePlayPauseBtn() {
  const btn = document.getElementById('play-pause-btn');
  btn.textContent = state.paused ? '▶' : '⏸';
}

function stopRitual() {
  clearInterval(state.intervalId);
  state.running = false;
  state.paused = false;
  releaseWakeLock();
  beep(330, 0.2, 0.2);
  document.getElementById('idle-screen').classList.remove('hidden');
  updatePlayPauseBtn();
}

function nextMove() {
  ensureAudio();
  if (!state.running) return;
  if (state.currentIdx >= SEQUENCE.length - 1) { finishRitual(); return; }
  flashTransition();
  beepNext();
  state.currentIdx++;
  state.timeLeft = SEQUENCE[state.currentIdx].duration;
  renderMove(state.currentIdx);
}

function prevMove() {
  ensureAudio();
  if (!state.running) return;
  if (state.currentIdx <= 0) return;
  flashTransition();
  state.currentIdx--;
  state.timeLeft = SEQUENCE[state.currentIdx].duration;
  renderMove(state.currentIdx);
  beep(550, 0.1);
}

function toggleSound() {
  state.soundOn = !state.soundOn;
  document.getElementById('sound-btn').textContent = state.soundOn ? '🔔' : '🔕';
}

function restartRitual() {
  document.getElementById('complete-screen').classList.add('hidden');
  startRitual();
}

// Init
renderMove(0);
</script>
