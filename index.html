<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rising Ritual">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="manifest.json">
<title>The Rising Ritual</title>
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESET & BASE — all inline, no external fonts
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
}

html {
background-color: #0d0f14;
height: -webkit-fill-available;
}

body {
background-color: #0d0f14;
color: #e8eaf0;
font-family: -apple-system, ‘SF Pro Text’, ‘Helvetica Neue’, Arial, sans-serif;
-webkit-font-smoothing: antialiased;
height: 100vh;
height: -webkit-fill-available;
overflow: hidden;
position: fixed;
width: 100%;
top: 0; left: 0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
SAFE AREA — Dynamic Island / notch aware
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
–sat: env(safe-area-inset-top, 47px);
–sar: env(safe-area-inset-right, 0px);
–sab: env(safe-area-inset-bottom, 34px);
–sal: env(safe-area-inset-left, 0px);

–bg:      #0d0f14;
–bg2:     #131720;
–text:    #e8eaf0;
–text2:   #7880a0;
–text3:   #3e4560;
–accent:  #4f8ef7;
–fire:    #f05a28;
–gold:    #f0a843;
–green:   #3ecf78;
–purple:  #a78bfa;

–topbar-h: calc(var(–sat) + 48px);
–ctrl-h:   calc(var(–sab) + 88px);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
WAKE-LOCK VIDEO
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#wv {
position: fixed;
top: -9999px; left: -9999px;
width: 1px; height: 1px;
opacity: 0.01;
pointer-events: none;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
FLASH OVERLAY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#flash {
position: fixed; inset: 0;
background: rgba(79,142,247,0.08);
pointer-events: none;
opacity: 0;
z-index: 900;
}
#flash.on { animation: flashAnim 0.5s ease forwards; }
@keyframes flashAnim { 0%{opacity:1} 100%{opacity:0} }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
SCREENS: IDLE + COMPLETE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.screen {
position: fixed; inset: 0;
background-color: #0d0f14;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
z-index: 800;
padding: calc(var(–sat) + 20px) 36px calc(var(–sab) + 20px);
text-align: center;
}
.screen.hidden { display: none; }

/* idle */
.idle-icon {
font-size: 52px;
margin-bottom: 26px;
animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
0%,100% { transform: scale(1); opacity: 0.8; }
50%      { transform: scale(1.07); opacity: 1; }
}
.idle-eyebrow {
font-size: 10px; letter-spacing: 4px;
color: var(–accent); text-transform: uppercase;
font-weight: 600; margin-bottom: 10px;
}
.idle-title {
font-size: 28px; font-weight: 800;
color: var(–text); letter-spacing: -0.5px;
margin-bottom: 8px;
}
.idle-sub {
font-size: 14px; color: var(–text2);
line-height: 1.65; margin-bottom: 40px;
}
.idle-stats { display: flex; gap: 36px; margin-bottom: 48px; }
.idle-stat  { text-align: center; }
.stat-num {
display: block;
font-size: 36px; font-weight: 800;
color: var(–text);
font-variant-numeric: tabular-nums;
line-height: 1;
}
.stat-lbl {
display: block;
font-size: 9px; letter-spacing: 2px;
color: var(–text3); text-transform: uppercase;
margin-top: 4px;
}
#btn-start {
width: 100%; max-width: 280px;
padding: 20px 0;
background-color: var(–accent);
border: none; border-radius: 16px;
font-size: 16px; font-weight: 700;
color: #fff; cursor: pointer;
letter-spacing: 0.3px;
box-shadow: 0 8px 32px rgba(79,142,247,0.4);
transition: transform 0.15s, opacity 0.15s;
}
#btn-start:active { transform: scale(0.97); opacity: 0.9; }

/* complete */
.complete-icon {
font-size: 60px; margin-bottom: 24px;
animation: breathe 3s ease-in-out infinite;
}
.complete-title {
font-size: 20px; font-weight: 700;
color: var(–green); letter-spacing: 1px;
margin-bottom: 12px;
}
.complete-body {
font-size: 15px; color: var(–text2);
line-height: 1.85; margin-bottom: 36px;
}
#btn-restart {
padding: 15px 40px;
background-color: var(–bg2);
border: 1px solid #252a38;
border-radius: 14px;
font-size: 15px; font-weight: 600;
color: var(–text); cursor: pointer;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
MAIN APP SHELL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#app {
position: fixed; inset: 0;
display: flex; flex-direction: column;
background-color: #0d0f14;
/* content starts below Dynamic Island */
padding-top: var(–topbar-h);
/* content ends above home indicator */
padding-bottom: var(–ctrl-h);
overflow: hidden;
}

/* ── TOP BAR (sits in the safe zone, behind DI) ── */
#top-bar {
position: fixed;
top: 0; left: 0; right: 0;
height: var(–topbar-h);
display: flex;
align-items: flex-end;
justify-content: space-between;
padding: 0 22px 12px;
background-color: #0d0f14;
z-index: 100;
}
.top-title {
font-size: 11px; letter-spacing: 3px;
color: var(–text3); text-transform: uppercase;
font-weight: 600;
}
#snd-btn {
background: none; border: none;
font-size: 18px; cursor: pointer;
color: var(–text2); padding: 4px;
line-height: 1;
}

/* ── CONTENT ROWS ── */
#phase-row {
display: flex; align-items: center;
justify-content: space-between;
padding: 4px 22px 2px;
flex-shrink: 0;
}
#phase-pill { display: flex; align-items: center; gap: 7px; }
#phase-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
#phase-lbl  {
font-size: 10px; letter-spacing: 2.5px;
color: var(–text2); text-transform: uppercase;
font-weight: 600;
}
#move-ctr {
font-size: 10px; color: var(–text3);
letter-spacing: 0.5px;
}

#move-name {
padding: 4px 22px 0;
font-size: 23px; font-weight: 800;
color: var(–text);
line-height: 1.15; letter-spacing: -0.4px;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
flex-shrink: 0;
}

/* ── TIMER RING ── */
#timer-wrap {
display: flex; align-items: center; justify-content: center;
padding: 8px 0 4px;
position: relative;
flex-shrink: 0;
}
#ring-svg {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%) rotate(-90deg);
pointer-events: none;
}
.r-bg { fill: none; stroke: #1a1e2c; stroke-width: 3; }
.r-fg {
fill: none; stroke-width: 3; stroke-linecap: round;
transition: stroke-dashoffset 0.95s linear, stroke 0.4s ease;
}
#big-time {
font-size: 78px; font-weight: 800;
color: var(–text);
font-variant-numeric: tabular-nums;
letter-spacing: -4px; line-height: 1;
position: relative; z-index: 1;
transition: color 0.3s;
/* SF Pro / system monospaced digits */
font-feature-settings: “tnum”;
}
#big-time.urgent { color: var(–fire); }

/* ── DESCRIPTION ── */
#desc-area { padding: 6px 22px 0; flex-shrink: 0; }
#desc-txt {
font-size: 13px; color: var(–text2);
line-height: 1.65;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}
#breath-ln {
margin-top: 5px;
font-size: 11.5px; font-weight: 600;
color: var(–accent); line-height: 1.5;
}

/* ── NEXT ── */
#next-row {
display: flex; align-items: center; gap: 8px;
padding: 6px 22px 0;
flex-shrink: 0;
}
#next-lbl {
font-size: 9px; letter-spacing: 2px;
color: var(–text3); text-transform: uppercase;
font-weight: 600; white-space: nowrap;
}
#next-nm { font-size: 12px; color: var(–text2); font-weight: 500; }

/* ── BANDHAS ── */
#bandha-row {
display: flex; flex-wrap: wrap; gap: 6px;
padding: 6px 22px 0;
flex-shrink: 0;
}
.btag {
padding: 5px 13px; border-radius: 20px;
font-size: 10px; font-weight: 700;
letter-spacing: 0.3px;
}
.bm  { color: #f05a28; background-color: rgba(240,90,40,0.13); }
.bu  { color: #f0a843; background-color: rgba(240,168,67,0.13); }
.bj  { color: #4f8ef7; background-color: rgba(79,142,247,0.13); }
.bmh { color: #a78bfa; background-color: rgba(167,139,250,0.13); }
.bn  { color: #3e4560; background-color: rgba(255,255,255,0.04); font-weight: 500; }

/* ── SCROLL AREA ── */
#scroll-area {
flex: 1;
overflow-y: auto; overflow-x: hidden;
-webkit-overflow-scrolling: touch;
padding: 10px 22px 8px;
/* fade top edge */
-webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 18px, black 100%);
mask-image: linear-gradient(to bottom, transparent 0%, black 18px, black 100%);
}
#scroll-area::-webkit-scrollbar { display: none; }

.sec-lbl {
font-size: 9px; letter-spacing: 2.5px;
text-transform: uppercase;
color: var(–text3); font-weight: 600;
margin-top: 16px; margin-bottom: 8px;
}
.sec-lbl:first-child { margin-top: 0; }

/* thin hairline separator */
.sec-lbl::after {
content: ‘’;
display: inline-block;
height: 1px;
width: 100%;
background-color: #1a1e2c;
vertical-align: middle;
margin-left: 8px;
position: relative; top: -1px;
}

.steps { list-style: none; }
.steps li {
display: flex; gap: 12px;
margin-bottom: 9px;
font-size: 13px; line-height: 1.65;
color: var(–text2);
align-items: flex-start;
}
.sn {
min-width: 22px; height: 22px;
border-radius: 50%;
background-color: rgba(255,255,255,0.05);
color: var(–text3); font-size: 9px;
display: flex; align-items: center; justify-content: center;
font-weight: 700; flex-shrink: 0; margin-top: 2px;
}

.chakra-row { display: flex; align-items: flex-start; gap: 10px; }
.chakra-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.chakra-body { font-size: 13px; color: var(–text2); line-height: 1.65; }
.chakra-nm   { font-weight: 700; color: var(–text); }

.tip-box {
background-color: rgba(79,142,247,0.07);
border-left: 2px solid rgba(79,142,247,0.4);
padding: 11px 14px;
border-radius: 0 10px 10px 0;
font-size: 12.5px; color: var(–text2); line-height: 1.65;
}

/* ── CONTROLS (fixed bottom) ── */
#ctrl-wrap {
position: fixed;
bottom: 0; left: 0; right: 0;
height: var(–ctrl-h);
display: flex; flex-direction: column;
justify-content: flex-start;
padding: 8px 22px calc(var(–sab) + 8px);
background: linear-gradient(to top, #0d0f14 60%, transparent 100%);
z-index: 100;
}

/* total progress bar */
#prog-row {
display: flex; align-items: center; gap: 10px;
margin-bottom: 10px;
}
#prog-elapsed, #prog-remain {
font-size: 11px; color: var(–text3);
font-variant-numeric: tabular-nums;
white-space: nowrap;
min-width: 34px;
}
#prog-remain { text-align: right; }
#prog-track {
flex: 1; height: 2px;
background-color: #1a1e2c;
border-radius: 1px; overflow: hidden;
}
#prog-fill {
height: 100%;
background: linear-gradient(to right, var(–purple), var(–accent));
border-radius: 1px;
transition: width 0.7s ease;
width: 0%;
}

/* button row */
#btn-row {
display: flex; align-items: center;
justify-content: center; gap: 14px;
}
.cb {
display: flex; align-items: center; justify-content: center;
border: none; cursor: pointer; border-radius: 50%;
background-color: rgba(255,255,255,0.07);
color: var(–text);
transition: transform 0.12s, background-color 0.12s;
flex-shrink: 0;
}
.cb:active {
transform: scale(0.87);
background-color: rgba(255,255,255,0.14);
}
.cb.sm { width: 44px; height: 44px; font-size: 15px; }
.cb.md { width: 50px; height: 50px; font-size: 17px; }
.cb.lg {
width: 66px; height: 66px; font-size: 23px;
background-color: var(–accent); color: #fff;
box-shadow: 0 6px 28px rgba(79,142,247,0.45);
}
.cb.lg:active { background-color: #3a7ee0; }
.cb.stop {
background-color: rgba(240,90,40,0.1);
color: var(–fire);
}
.cb.plus {
font-size: 11px; font-weight: 700;
color: var(–text2);
}
</style>

</head>

<!-- ══ IDLE SCREEN ══ -->

<div id="idle" class="screen">
  <div class="idle-icon">⚡</div>
  <div class="idle-eyebrow">Morning Practice</div>

<div id="ctrl-wrap">

    <div id="prog-track"><div id="prog-fill"></div></div>
    <span id="prog-remain">22:15</span>
  </div>
  <div id="btn-row">
    <button class="cb sm"   onclick="prevMove()"    title="Previous">⏮</button>
    <button class="cb md stop" onclick="stopRitual()" title="Stop">■</button>
    <button class="cb lg"   id="pp-btn" onclick="togglePause()">▶</button>

<script>
// ═══════════════════════════════════════════════
// REGISTER SERVICE WORKER
// ═══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const PHASES = {
  warmup:{ lbl:'WARM-UP',         col:'#f0a843', emoji:'🟠' },

// WAKE LOCK
// ═══════════════════════════════════════════════
let wkSentinel = null;

async function wkReq() {
  if ('wakeLock' in navigator) {
    try {
      wkSentinel = await navigator.wakeLock.request('screen');
      return;
    } catch (e) {}
  }
  // iOS fallback: silent looping video
  try { await document.getElementById('wv').play(); } catch (e) {}
}

function wkRel() {
  if (wkSentinel) { wkSentinel.release().catch(() => {}); wkSentinel = null; }
  try { document.getElementById('wv').pause(); } catch (e) {}
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && S.running && !S.paused) {
    await wkReq();
  }
});

// ═══════════════════════════════════════════════
// TTS — female voice, reads movement name
// ═══════════════════════════════════════════════
function speak(text) {
  if (!S.soundOn) return;
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9; u.pitch = 1.1; u.volume = 1; u.lang = 'en-US';
  const voices = window.speechSynthesis.getVoices();
  const femaleKw = ['samantha', 'karen', 'victoria', 'tessa', 'moira', 'fiona',
                    'veena', 'female', 'woman'];
  const female = voices.find(v =>
    femaleKw.some(k => v.name.toLowerCase().includes(k)) && v.lang.startsWith('en')
  );
  u.voice = female || voices.find(v => v.lang.startsWith('en')) || null;
  window.speechSynthesis.speak(u);
}

function loadVoices() {
  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
}

// AUDIO BEEPS
// ═══════════════════════════════════════════════
let ac = null;
function ensureAC() {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq = 880, dur = 0.12, vol = 0.25) {
  if (!S.soundOn) return;
  try {
    ensureAC();
    if (ac.state === 'suspended') ac.resume();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch (e) {}
}
const bNext = () => { beep(750, 0.09); setTimeout(() => beep(940, 0.12), 120); };
const bEnd  = () => { beep(400, 0.1); setTimeout(() => beep(520, 0.1), 150); setTimeout(() => beep(660, 0.22), 310); };
const bTick = () => beep(1200, 0.05, 0.1);

  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

}

  $('ring-arc').style.stroke  = ph.col;
  $('desc-txt').textContent   = m.desc;
  $('breath-ln').textContent  = '\u21b3\u2002' + m.breath;
  $('next-nm').textContent    = nxt ? nxt.name + '\u2002·\u2002' + nxt.dur + 's' : '— End of Practice';

  // bandhas
  $('bandha-row').innerHTML = m.bandhas
    .map(b => `<span class="btag ${b.c}">${b.l}</span>`)
    .join('');

  // scrollable content
  const steps = m.steps.map((s, i) =>
    `<li><span class="sn">${i + 1}</span>${s}</li>`
  ).join('');
  const tip = m.tip
    ? `<div class="sec-lbl">Tip</div><div class="tip-box">${m.tip}</div>`
    : '';

  $('scroll-content').innerHTML = `
    <div class="sec-lbl">How to perform</div>
    <ul class="steps">${steps}</ul>
    <div class="sec-lbl">Chakra focus</div>
    <div class="chakra-row">
      <div class="chakra-dot" style="background-color:${m.chakra.col}"></div>
      <div class="chakra-body">
        <span class="chakra-nm">${m.chakra.name}</span> — ${m.chakra.note}
      </div>
    </div>
    ${tip}
    <div style="height:14px"></div>
  `;

  $('scroll-area').scrollTop = 0;
  updateTimers();
}

function updateTimers() {
  const t   = S.timeLeft;
  const el  = elapsed();
  const rem = Math.max(0, TOTAL - el);

  // big timer
  const bt = $('big-time');
  bt.textContent = fmt(t);
  bt.className   = (t <= 5 && S.running && !S.paused) ? 'urgent' : '';

  // ring arc   r = 96, circumference = 2π × 96 ≈ 603.2
  const circ = 603.2;
  $('ring-arc').style.strokeDashoffset = circ * (1 - t / SEQ[S.idx].dur);

  // total bar
  $('prog-fill').style.width      = (el / TOTAL * 100) + '%';
  $('prog-elapsed').textContent   = fmt(el);
  $('prog-remain').textContent    = fmt(rem);
}

// ═══════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════
function startRitual() {
  ensureAC();
  loadVoices();
  S.idx      = 0;
  S.timeLeft = SEQ[0].dur;
  S.running  = true;
  S.paused   = false;

  $('idle').classList.add('hidden');
  $('complete').classList.add('hidden');
  $('pp-btn').textContent = '⏸';

  render();
  S.iid = setInterval(tick, 1000);
  wkReq();
  setTimeout(() => speak(SEQ[0].name), 700);
}

function tick() {
  if (S.paused) return;
  S.timeLeft--;
  if (S.timeLeft <= 3 && S.timeLeft > 0) bTick();
  updateTimers();
  if (S.timeLeft <= 0) advance();
}

function advance() {
  if (S.idx >= SEQ.length - 1) { finish(); return; }
  doFlash(); bNext();
  S.idx++;
  S.timeLeft = SEQ[S.idx].dur;
  render();
  setTimeout(() => speak(SEQ[S.idx].name), 350);
}

function finish() {
  clearInterval(S.iid);
  S.running = false;
  wkRel(); bEnd();
  setTimeout(() => speak('Practice complete. Well done.'), 600);
  $('complete').classList.remove('hidden');
}

function togglePause() {
  ensureAC();
  if (!S.running) return;
  S.paused = !S.paused;
  $('pp-btn').textContent = S.paused ? '▶' : '⏸';
  if (!S.paused) { wkReq(); beep(700, 0.08); }
  else           { wkRel(); beep(440, 0.1); }
}

function stopRitual() {
  clearInterval(S.iid);
  S.running = false;
  S.paused  = false;
  wkRel(); beep(300, 0.2, 0.2);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  $('idle').classList.remove('hidden');
  $('pp-btn').textContent = '▶';
}

function nextMove() {
  ensureAC();
  if (!S.running) return;
  if (S.idx >= SEQ.length - 1) { finish(); return; }
  doFlash(); bNext();
  S.idx++;
  S.timeLeft = SEQ[S.idx].dur;
  render();
  setTimeout(() => speak(SEQ[S.idx].name), 350);
}

function prevMove() {
  ensureAC();
  if (!S.running || S.idx <= 0) return;
  doFlash(); beep(550, 0.1);
  S.idx--;
  S.timeLeft = SEQ[S.idx].dur;
  render();
  setTimeout(() => speak(SEQ[S.idx].name), 350);
}

function skipAdd() {
  if (!S.running) return;
  // Add 15s, but don't exceed current movement duration
  S.timeLeft = Math.min(SEQ[S.idx].dur, S.timeLeft + 15);
  updateTimers();
}

function toggleSound() {
  S.soundOn = !S.soundOn;
  $('snd-btn').textContent = S.soundOn ? '🔔' : '🔕';
}

function restartRitual() {
  $('complete').classList.add('hidden');
  startRitual();
}

// ─── Init: show first move in preview ───
render();
</script>
