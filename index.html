<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rising Ritual">
<title>THE RISING RITUAL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161d;
  --card: #181c25;
  --border: #252a38;
  --border2: #1e2330;
  --accent: #4f8ef7;
  --accent2: #7c5cfc;
  --gold: #f0a843;
  --fire: #f05a28;
  --green: #3ecf78;
  --text: #e8eaf0;
  --text2: #8890a8;
  --text3: #545c72;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

body {
font-family: ‘Inter’, system-ui, sans-serif;
background: var(–bg);
color: var(–text);
position: fixed;
width: 100%; height: 100%;
overflow: hidden;
}

/* ══ IDLE SCREEN ══ */
#idle {
position: absolute; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background: var(–bg);
padding: calc(var(–safe-top) + 20px) 32px calc(var(–safe-bot) + 20px);
z-index: 100;
}
#idle.hidden { display: none; }

.idle-symbol {
font-size: 52px; margin-bottom: 28px;
animation: pulse-glow 4s ease-in-out infinite;
}
@keyframes pulse-glow {
0%,100% { filter: drop-shadow(0 0 10px rgba(79,142,247,0.3)); transform: scale(1); }
50% { filter: drop-shadow(0 0 28px rgba(79,142,247,0.7)); transform: scale(1.06); }
}

.idle-tag {
font-size: 10px; letter-spacing: 4px; color: var(–accent);
text-transform: uppercase; margin-bottom: 10px; font-weight: 600;
}
.idle-title {
font-family: ‘Space Mono’, monospace;
font-size: 26px; font-weight: 700;
color: var(–text); letter-spacing: 1px;
margin-bottom: 6px; text-align: center;
}
.idle-sub {
font-size: 13px; color: var(–text2); margin-bottom: 36px;
text-align: center; line-height: 1.6;
}

.idle-stats {
display: flex; gap: 32px; margin-bottom: 44px;
}
.idle-stat { text-align: center; }
.idle-stat-n {
font-family: ‘Space Mono’, monospace;
font-size: 30px; font-weight: 700; color: var(–text);
display: block; line-height: 1;
}
.idle-stat-l {
font-size: 9px; letter-spacing: 2px; color: var(–text3);
text-transform: uppercase; margin-top: 4px; display: block;
}

#btn-start {
width: 100%; max-width: 280px;
padding: 18px 0;
background: var(–accent);
border: none; border-radius: 14px;
font-family: ‘Inter’, sans-serif;
font-size: 15px; font-weight: 700;
letter-spacing: 1px; color: #fff;
cursor: pointer;
transition: all 0.2s;
box-shadow: 0 8px 32px rgba(79,142,247,0.35);
}
#btn-start:active { transform: scale(0.97); opacity: 0.9; }

/* ══ COMPLETE SCREEN ══ */
#complete {
position: absolute; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
background: var(–bg); z-index: 100;
padding: 40px 32px;
text-align: center;
}
#complete.hidden { display: none; }
.complete-icon { font-size: 60px; margin-bottom: 24px; animation: pulse-glow 3s ease-in-out infinite; }
.complete-title {
font-family: ‘Space Mono’, monospace;
font-size: 20px; color: var(–green);
letter-spacing: 2px; margin-bottom: 12px;
}
.complete-msg { font-size: 14px; color: var(–text2); line-height: 1.8; margin-bottom: 36px; }
#btn-restart {
padding: 14px 36px;
background: var(–card); border: 1px solid var(–border);
border-radius: 12px; font-size: 14px; font-weight: 600;
color: var(–text); cursor: pointer;
}

/* ══ MAIN APP ══ */
#app {
display: flex; flex-direction: column;
height: 100%; height: -webkit-fill-available;
padding-top: var(–safe-top);
padding-bottom: var(–safe-bot);
}

/* ── TOP BAR ── */
#top-bar {
display: flex; align-items: center; justify-content: space-between;
padding: 10px 20px 8px;
flex-shrink: 0;
}
.top-title {
font-size: 11px; letter-spacing: 3px; color: var(–text3);
text-transform: uppercase; font-weight: 600;
}
#sound-btn {
background: none; border: none; font-size: 18px;
cursor: pointer; padding: 4px; color: var(–text2);
}

/* ── PHASE + MOVEMENT NAME ── */
#phase-row {
padding: 0 20px 4px;
display: flex; align-items: center; gap: 8px;
flex-shrink: 0;
}
#phase-pill {
display: flex; align-items: center; gap: 5px;
padding: 4px 10px; border-radius: 20px;
border: 1px solid var(–border);
background: var(–surface);
}
#phase-dot { width: 6px; height: 6px; border-radius: 50%; background: var(–accent); flex-shrink: 0; }
#phase-label { font-size: 9px; letter-spacing: 2px; color: var(–text2); text-transform: uppercase; font-weight: 600; }
#move-counter { font-size: 9px; color: var(–text3); margin-left: auto; letter-spacing: 1px; }

#move-name-big {
padding: 6px 20px 0;
font-family: ‘Space Mono’, monospace;
font-size: 20px; font-weight: 700;
color: var(–text); line-height: 1.2;
flex-shrink: 0;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── BIG TIMER ── */
#timer-block {
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 10px 20px 4px;
flex-shrink: 0;
}
#big-timer {
font-family: ‘Space Mono’, monospace;
font-size: 72px; font-weight: 700;
color: var(–text); letter-spacing: -2px;
line-height: 1;
}
#big-timer.urgent { color: var(–fire); }

/* thin arc progress for movement */
#arc-wrap { position: relative; display: inline-flex; }
#arc-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-90deg); pointer-events: none; }
.arc-bg { fill: none; stroke: var(–border); stroke-width: 2.5; }
.arc-fg { fill: none; stroke-width: 2.5; stroke-linecap: round; transition: stroke-dashoffset 0.8s linear, stroke 0.3s; }

/* ── DESCRIPTION BOX ── */
#desc-box {
margin: 6px 20px 0;
background: var(–surface);
border: 1px solid var(–border2);
border-radius: 12px;
padding: 12px 16px;
flex-shrink: 0;
}
#desc-text {
font-size: 13px; color: var(–text2); line-height: 1.65;
display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
overflow: hidden;
}
#breath-line {
margin-top: 8px;
font-size: 11px; font-weight: 600; color: var(–accent);
letter-spacing: 0.3px;
}

/* ── NEXT MOVEMENT ── */
#next-bar {
display: flex; align-items: center; gap: 8px;
padding: 6px 20px;
flex-shrink: 0;
}
#next-label { font-size: 10px; color: var(–text3); letter-spacing: 1px; }
#next-name  { font-size: 12px; color: var(–text2); font-weight: 500; }

/* ── BANDHA ROW ── */
#bandha-row {
display: flex; flex-wrap: wrap; gap: 6px;
padding: 4px 20px 0;
flex-shrink: 0;
}
.btag {
padding: 5px 11px; border-radius: 20px;
font-size: 10px; font-weight: 700;
letter-spacing: 0.5px; border: 1px solid;
font-family: ‘Space Mono’, monospace;
}
.btag-mula     { color: #f05a28; border-color: rgba(240,90,40,0.4); background: rgba(240,90,40,0.1); }
.btag-uddiyana { color: #f0a843; border-color: rgba(240,168,67,0.4); background: rgba(240,168,67,0.1); }
.btag-jalandhara { color: #4f8ef7; border-color: rgba(79,142,247,0.4); background: rgba(79,142,247,0.1); }
.btag-maha     { color: #a78bfa; border-color: rgba(167,139,250,0.4); background: rgba(167,139,250,0.1); }
.btag-none     { color: var(–text3); border-color: var(–border); background: none; font-family: ‘Inter’, sans-serif; font-weight: 500; font-size: 10px; letter-spacing: 0; }

/* ── SCROLL DETAILS ── */
#details-area {
flex: 1; overflow-y: auto; overflow-x: hidden;
-webkit-overflow-scrolling: touch;
padding: 8px 20px 8px;
}
#details-area::-webkit-scrollbar { display: none; }

.det-section { margin-bottom: 10px; }
.det-label {
font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
color: var(–text3); font-weight: 600;
margin-bottom: 6px;
display: flex; align-items: center; gap: 8px;
}
.det-label::after { content:’’; flex:1; height:1px; background: var(–border2); }

.steps-list { list-style: none; }
.steps-list li {
display: flex; gap: 10px; margin-bottom: 7px;
font-size: 12.5px; line-height: 1.6; color: var(–text2);
}
.steps-list li::before {
content: attr(data-n);
min-width: 20px; height: 20px;
border-radius: 50%; background: var(–surface);
border: 1px solid var(–border);
color: var(–text3); font-size: 9px;
display: flex; align-items: center; justify-content: center;
font-family: ‘Space Mono’, monospace; margin-top: 2px; flex-shrink: 0;
}

.chakra-row { display: flex; align-items: flex-start; gap: 10px; }
.chakra-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.chakra-body { font-size: 12.5px; color: var(–text2); line-height: 1.6; }
.chakra-name { font-weight: 600; color: var(–text); }

.tip-box {
background: rgba(79,142,247,0.06);
border: 1px solid rgba(79,142,247,0.2);
border-radius: 10px; padding: 10px 12px;
font-size: 12px; color: var(–text2); line-height: 1.65;
}

/* ── BOTTOM CONTROLS ── */
#controls {
flex-shrink: 0;
padding: 8px 20px 10px;
background: linear-gradient(0deg, var(–bg) 60%, transparent);
}

/* overall progress */
#total-row {
display: flex; align-items: center; gap: 10px;
margin-bottom: 10px;
}
#total-elapsed { font-size: 11px; color: var(–text3); font-family: ‘Space Mono’, monospace; white-space: nowrap; }
#total-track { flex:1; height: 3px; background: var(–border); border-radius: 2px; overflow: hidden; }
#total-fill { height:100%; background: linear-gradient(90deg, var(–accent2), var(–accent)); border-radius: 2px; transition: width 0.6s ease; width: 0%; }
#total-remain { font-size: 11px; color: var(–text3); font-family: ‘Space Mono’, monospace; white-space: nowrap; }

/* buttons */
#btn-row { display: flex; align-items: center; justify-content: center; gap: 12px; }

.cb {
display: flex; align-items: center; justify-content: center;
border: none; cursor: pointer; border-radius: 50%;
background: var(–surface); border: 1px solid var(–border);
color: var(–text); transition: all 0.12s; flex-shrink: 0;
}
.cb:active { transform: scale(0.9); }
.cb.sm { width: 46px; height: 46px; font-size: 15px; }
.cb.md { width: 52px; height: 52px; font-size: 17px; }
.cb.lg {
width: 64px; height: 64px; font-size: 22px;
background: var(–accent); border-color: transparent;
color: #fff;
box-shadow: 0 6px 24px rgba(79,142,247,0.4);
}
.cb.lg:active { background: #3a7ee0; }
.cb.stop-btn { background: rgba(240,90,40,0.12); border-color: rgba(240,90,40,0.3); color: var(–fire); }

/* Flash overlay */
#flash {
position: fixed; inset: 0;
background: rgba(79,142,247,0.08);
pointer-events: none; opacity: 0; z-index: 500;
}
#flash.on { animation: flashAnim 0.4s ease; }
@keyframes flashAnim {
0% { opacity:1; } 100% { opacity:0; }
}

/* Hidden video wake-lock */
#wv { position:fixed; top:-9999px; left:-9999px; width:1px; height:1px; opacity:0.01; }
</style>

</head>

<!-- IDLE -->

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const TOTAL_DUR = SEQ.reduce((s,m)=>s+m.dur,0);

let S = {
  running: false,
  paused: false,
  idx: 0,
  timeLeft: 0,
  elapsed: 0,
  iid: null,
  soundOn: true,
};

// ══════════════════════════════════════════
// WAKE LOCK
// ══════════════════════════════════════════
let wkSentinel = null;
async function wkRequest() {
  if ('wakeLock' in navigator) {
    try { wkSentinel = await navigator.wakeLock.request('screen'); return; } catch(e){}
  }
  try { await document.getElementById('wv').play(); } catch(e){}
}
function wkRelease() {
  if (wkSentinel) { wkSentinel.release().catch(()=>{}); wkSentinel=null; }
  try { document.getElementById('wv').pause(); } catch(e){}
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState==='visible' && S.running && !S.paused) await wkRequest();
});

// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let ac = null;
function ensureAC() { if (!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); }
function beep(f=880,d=0.12,v=0.3) {
  if (!S.soundOn) return;
  try {
    ensureAC();
    if (ac.state==='suspended') ac.resume();
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value=f;
    g.gain.setValueAtTime(v,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
    o.start(); o.stop(ac.currentTime+d);
  } catch(e){}
}
const bStart = ()=>{ beep(600,0.09); setTimeout(()=>beep(800,0.12),110); setTimeout(()=>beep(1000,0.15),240); };
const bNext  = ()=>{ beep(750,0.1); setTimeout(()=>beep(900,0.12),130); };
const bEnd   = ()=>{ beep(400,0.12); setTimeout(()=>beep(520,0.12),150); setTimeout(()=>beep(640,0.25),310); };
const bTick  = ()=>{ beep(1200,0.05,0.12); };

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function fmt(s) {
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function $(id) { return document.getElementById(id); }

function flash() {
  const el=$('flash');
  el.classList.remove('on');
  void el.offsetWidth;
  el.classList.add('on');
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const m = SEQ[S.idx];
  const ph = PHASES[m.phase];
  const next = S.idx < SEQ.length-1 ? SEQ[S.idx+1] : null;

  // phase
  $('phase-dot').style.background = ph.color;
  $('phase-label').textContent = ph.emoji + ' ' + ph.label;
  $('move-counter').textContent = (S.idx+1) + ' / ' + SEQ.length;

  // name
  $('move-name-big').textContent = m.name;

  // arc color
  $('arc-fg').style.stroke = ph.color;

  // desc
  $('desc-text').textContent = m.desc;
  $('breath-line').textContent = '↳ ' + m.breath;

  // next
  $('next-name').textContent = next ? next.name + ' · ' + next.dur + 's' : '— End of Practice';

  // bandhas
  const bRow = $('bandha-row');
  bRow.innerHTML = m.bandhas.map(b =>
    `<span class="btag ${b.c}">${b.l}</span>`
  ).join('');

  // details
  const stepsHTML = m.steps.map((s,i)=>`<li data-n="${i+1}">${s}</li>`).join('');
  const tipHTML = m.tip ? `<div class="det-section"><div class="det-label">Tip</div><div class="tip-box">${m.tip}</div></div>` : '';

  $('det-content').innerHTML = `
    <div class="det-section">
      <div class="det-label">How to perform</div>
      <ol class="steps-list">${stepsHTML}</ol>
    </div>
    <div class="det-section">
      <div class="det-label">Chakra</div>
      <div class="chakra-row">
        <div class="chakra-dot" style="background:${m.chakra.color}"></div>
        <div class="chakra-body"><span class="chakra-name">${m.chakra.name}</span> — ${m.chakra.note}</div>
      </div>
    </div>
    ${tipHTML}
    <div style="height:8px"></div>
  `;

  $('details-area').scrollTop = 0;
  updateTimers();
}

function updateTimers() {
  const m = SEQ[S.idx];
  const t = S.timeLeft;

  // big timer
  const el = $('big-timer');
  el.textContent = fmt(t);
  el.className = t <= 5 && S.running ? 'urgent' : '';

  // arc
  const circ = 565.5;
  const frac = t / m.dur;
  $('arc-fg').style.strokeDashoffset = circ * (1 - frac);

  // total progress bar
  const elapsed = S.elapsed;
  const pct = (elapsed / TOTAL_DUR) * 100;
  $('total-fill').style.width = pct + '%';
  $('total-elapsed').textContent = fmt(elapsed);
  $('total-remain').textContent = fmt(Math.max(0, TOTAL_DUR - elapsed));
}

// ══════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════
function startRitual() {
  ensureAC();
  S.idx = 0; S.timeLeft = SEQ[0].dur; S.elapsed = 0;
  S.running = true; S.paused = false;

  $('idle').classList.add('hidden');
  $('complete').classList.add('hidden');

  render();
  S.iid = setInterval(tick, 1000);
  wkRequest();
  bStart();
  $('pp-btn').textContent = '⏸';
}

function tick() {
  if (S.paused) return;
  S.timeLeft--; S.elapsed++;
  if (S.timeLeft <= 3 && S.timeLeft > 0) bTick();
  updateTimers();
  if (S.timeLeft <= 0) advance();
}

function advance() {
  if (S.idx >= SEQ.length - 1) { finish(); return; }
  flash(); bNext();
  S.idx++;
  S.timeLeft = SEQ[S.idx].dur;
  render();
}

function finish() {
  clearInterval(S.iid); S.running = false;
  wkRelease(); bEnd();
  $('complete').classList.remove('hidden');
}

function togglePause() {
  ensureAC();
  if (!S.running) return;
  S.paused = !S.paused;
  $('pp-btn').textContent = S.paused ? '▶' : '⏸';
  if (!S.paused) { wkRequest(); beep(700,0.08); }
  else { wkRelease(); beep(440,0.1); }
}

function stopRitual() {
  clearInterval(S.iid); S.running=false; S.paused=false;
  wkRelease(); beep(300,0.2,0.2);
  $('idle').classList.remove('hidden');
  $('pp-btn').textContent='▶';
}

function nextMove() {
  ensureAC();
  if (!S.running) return;
  if (S.idx >= SEQ.length-1) { finish(); return; }
  flash(); bNext();
  S.idx++; S.timeLeft = SEQ[S.idx].dur;
  render();
}

function prevMove() {
  ensureAC();
  if (!S.running || S.idx <= 0) return;
  flash(); beep(550,0.1);
  S.idx--; S.timeLeft = SEQ[S.idx].dur;
  render();
}

function skipAdd() {
  if (!S.running) return;
  S.timeLeft = Math.max(0, S.timeLeft + 15);
  S.elapsed = Math.max(0, S.elapsed - 15);
  updateTimers();
}

function toggleSound() {
  S.soundOn = !S.soundOn;
  $('sound-btn').textContent = S.soundOn ? '🔔' : '🔕';
}

function restartRitual() {
  $('complete').classList.add('hidden');
  startRitual();
}

// Init — show first move preview
render();
</script>

</body>
</html>
